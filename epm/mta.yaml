_schema-version: 3.3.0
ID: epm
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: epm-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: epm-auth
      - name: epm-db
      - name: epm-postgres
      - name: epm-destination

  - name: epm-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: epm-db

  - name: epm-postgres-deployer
    type: nodejs
    path: gen/pg
    parameters:
      buildpack: nodejs_buildpack
      no-route: true
      no-start: true
      tasks:
        - name: deploy-to-postgresql
          command: npm start
    requires:
      - name: epm-postgres

  - name: epm-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: epm-auth
      - name: srv-api
      - name: epm-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:


  - name: epm-destinations
    type: com.sap.application.content
    requires:
      - name: epm-auth
        parameters:
          service-key:
            name: epm-auth-key
      - name: epm-html5-repo-host
        parameters:
          service-key:
            name: epm-html5-repo-host-key
      - name: srv-api
      - name: epm-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: epm-html5-repository
              ServiceInstanceName: epm-html5-repo-host
              ServiceKeyName: epm-html5-repo-host-key
              sap.cloud.service: epm.service
            - Name: epm-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: epm-auth
              ServiceKeyName: epm-auth-key
              sap.cloud.service: epm.service
resources:
  - name: epm-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: epm-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'Viewer (epm ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Viewer'
          - name: 'Editor (epm ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Editor'
          - name: 'userattributes (epm ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.userattributes'
  - name: epm-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: epm-postgres
    type: org.cloudfoundry.managed-service
    parameters:
      service: postgresql-db
      service-plan: development
  - name: epm-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api

  - name: epm-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
